# Reverse proxy que ocupa as portas 80/443 do host e roteia por nome de dominio.
# Termina o TLS (certificado wildcard *.rennercoatings.com em ./certs).
# Conectado as redes Docker das duas apps para resolver os containers pelo nome.
#
# Local na VM: /home/super/reverse-proxy/
# Subir/aplicar mudancas:  docker compose up -d
# Recarregar so a config:  docker exec reverse-proxy nginx -s reload
services:
  proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - astec
      - credito

networks:
  astec:
    external: true
    name: agenda-astec_default
  credito:
    external: true
    name: credito-cobranca_default
