# Reverse proxy (name-based virtual hosting) com TLS.
#   80  -> redireciona tudo para HTTPS
#   443 -> termina o TLS (wildcard *.rennercoatings.com) e roteia por dominio:
#          credito.rennercoatings.com -> credito-cobranca:3000
#          default (astecagenda...)   -> astec-app:5000
# Resolve os containers pelo DNS interno do Docker (proxy esta nas redes das apps).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

resolver 127.0.0.11 valid=10s ipv6=off;

# Parametros TLS
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

# ---- HTTP -> HTTPS (qualquer dominio) ----
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ---- HTTPS: credito ----
server {
    listen 443 ssl;
    http2 on;
    server_name credito.rennercoatings.com;

    ssl_certificate     /etc/nginx/certs/rennercoatings.crt;
    ssl_certificate_key /etc/nginx/certs/rennercoatings.key;

    client_max_body_size 10m;

    upstream credito_backend {
        server credito-cobranca:3000 max_fails=1 fail_timeout=10s;
        keepalive 32;
    }

    location / {
        proxy_pass http://credito_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_socket_keepalive on;
    }
}

# ---- HTTPS: ASTEC (default) ----
server {
    listen 443 ssl default_server;
    http2 on;
    server_name astecagenda.rennercoatings.com _;

    ssl_certificate     /etc/nginx/certs/rennercoatings.crt;
    ssl_certificate_key /etc/nginx/certs/rennercoatings.key;

    client_max_body_size 25m;

    upstream astec_backend {
        server astec-app:5000 max_fails=1 fail_timeout=10s;
        keepalive 128;
    }

    location / {
        proxy_pass http://astec_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_socket_keepalive on;
    }
}
