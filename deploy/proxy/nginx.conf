# ============================================================
#  Reverse proxy TLS - Renner Coatings
#  Certificado: /etc/nginx/certs/rennercoatings.(crt|key)
#  (extraidos do .pfx; ver README.md)
# ============================================================

# Parametros TLS comuns
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

# ---- Redireciona todo HTTP para HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name astecagenda.rennercoatings.com credito.rennercoatings.com;
    return 301 https://$host$request_uri;
}

# ---- ASTEC (Gestor de Agenda) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name astecagenda.rennercoatings.com;

    ssl_certificate     /etc/nginx/certs/rennercoatings.crt;
    ssl_certificate_key /etc/nginx/certs/rennercoatings.key;

    client_max_body_size 20m;

    location / {
        proxy_pass http://host.docker.internal:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (Socket.IO usado pelo ASTEC)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}

# ---- CREDITO ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name credito.rennercoatings.com;

    ssl_certificate     /etc/nginx/certs/rennercoatings.crt;
    ssl_certificate_key /etc/nginx/certs/rennercoatings.key;

    client_max_body_size 20m;

    location / {
        # >>> TROQUE __PORTA_CREDITO__ pela porta publicada da app credito no host <<<
        proxy_pass http://host.docker.internal:__PORTA_CREDITO__;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}
